body:
  text: 陣紀兵家類提要臣等謹案陣紀四卷明何良臣撰良臣字惟聖揚州人是編皆述練兵之法卷一曰募選束伍教練致用賞罰節制二巻曰竒正虚實衆寡率然技用三巻曰陣宜戰令戰機四卷曰摧陷因勢車戰騎戰歩戰水戰火戰夜戰山林谷澤之戰風雨雪霧之戰凡二十三數共六十六篇明之中葉武備廢弛疆圉有警大抵鳩烏合以赴敵十出九敗故良臣所述切切以選練爲先其所列機要亦多即中原野戰立說夫事機萬變應在一心蘇軾所謂神兵非學到自古不留訣也明代談兵之家自戚繼光諸書外往往捃摭陳言横生鄙論如湯光烈之掘穽藏錐彭翔之木人火馬殆如戲劇惟良臣嘗身在軍中目睹形勢非憑虛理斷攘袂坐談者可比在明代兵家猶爲切實近理者矣乾隆四十五年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:4afbadecc20579e4e4d86e2f1874a311c1b0a911956613f3ab7876ece948f325
