body:
  text: 陣紀卷四明何良臣撰摧陷必死不如樂死樂死不如義死義死不如視死如歸夫一人必死足敵十夫十夫必死足敵百夫百夫必死足敵千夫千夫必死足敵萬夫萬夫必死天下莫當况義死者乎設有義死之軰出死固難敵矣百人同心則能陷千人之陣亂千人之伍千人齊力則能覆三軍之衆殺萬人之將萬人并力則四海震驚無敵可向况必死者乎吳子曰有一死賊伏于曠野千人捕之莫不梟視狼顧者何也蓋恐死賊突至奮命傷人所謂一人挺刃萬人避之豈萬人皆不肖也必死與必生之心不同今能使千萬衆之氣如一死賊而誓不俱生則進不可當退不可拒雖有謀者亦難免也故善摧敵之堅陷敵之勢者能使三軍負必死之氣也善用必死之氣者當法諸楊素方諸淮隂考諸竇軌可也素每臨戰必令弱卒赴敵陷陣則已不能陷者悉斬之又令復進不能陷者更悉斬之則將士唯知進退皆死所向無不勝焉信當强敵每置軍于不能退走之地謂無所往矣無所往則知非死戰不能生非疾鬭不能出自是并其力齊其氣奮其命一其死而決之戰軌每赴敵有步將少却者俱斬之㧞隊中小校以代自率鐡騎以殿乃令之曰鼓發有不進者自後殺之士聞鼓聲無不争馳以進鬭所以嚴刑爲作氣之基作氣爲摧陷之本摧陷爲必勝之權故善決戰者必仗諸催陷能摧陷者必振其死氣善作氣者必極其煩刑法曰剛柔皆得地之利也又曰攜手若使一人不得已也死地有特致之者有悞至之者死氣有令作之者有自振之者恐其亂目也禁妖祥之事恐其惑心也去狐疑之思乃焚其貨財忘其生路使人人豎髮裂眥不待命令而皆自爲之戰所以發令之要在必信從作氣之機存乎心巧且兵無常勇亦無常怯氣使之耳氣强則勇氣懦則怯氣勇則戰勝氣怯則戰北勇怯强懦其由甚㣲善作氣者得乎機善用機者決諸勢勢莫為敵所用而我常用敵之勢也氣莫爲敵所奪而我常奪敵之氣也故其攻擊也若迅雷飄風其催陷也若崩潰倒決其搏執也若鷙鳥拏攫使敵莫測我之所以來莫禦我之所忽及吳子謂戰鬭之塲止屍之地是以喻之如坐漏船中伏于燒屋下若能厲氣舎死當敵之鋒則敵之勇者不及怒我智者不及謀我我或反生而敵必死耳所謂必死則生幸生必死能令人之必死者勵士之功也能使令之必從者教戒之法也故曰令以恩信行氣以振作勇又曰士人盡力我雖甚陷不懼因勢得機畧者不逼人之窮不攻人之銳不啟人之未及必因其盛而致之弛擊其虚而待其疲取其無備而疾襲其遲是以用兵之術唯因字最妙或因敵之險以爲己固或因敵之謀以爲己計或因其因而復變用其因或審其因而急乘其所因則用因而致勝者不可言窮矣敵雖有智必知其不能逃我之所因也吳子謂占將察才因形用權則不勞而功舉故敵處髙燥不利水草因而困之敵便水草已處卑下因而灌之敵居不便出入艱難糧道逺絶因而凌之敵地廣大食匱兵少四守失隘因而急之敵將貪利忽名可賄可啗上驕下怨可間可離愚昧輕信可懾可誘諠囂不整可薄可欺乘勞附利可襲可擊慮進疑退衆必失依人有歸志將不能禁開險塞易其軍必迷若夫敵人疲怠饑渴驚疑前隊未營後軍未涉偶直晦㝠風雨忽作故可用敵之勢以致勝也我勇且謀士卒死戰進如驟雨發如飄風故可因我之氣以決勝也闕山狹路大阜深澗龍蛇盤磴羊腸狗門險墮飛鳥守在一人故可因地之利以必勝也三者得一敵已挫亡俱得用者所向莫當所以善兵者必因敵而用變也因人而異施也因地而作勢也因情而措形也因制而立法也故曰能者用其自爲用也不能者用其爲己用也用其自爲用則天下莫不可用用其爲己用則所以得者鮮矣舉不輕勢不逆以一匹夫而能施德義協人心信刑賞新政令使人不敢逆其命令而必爲之致用者唯伊尹吕尚孫武穰苴管仲吳起韓信孔明之軰能之且輕舉者必敗也逆勢者必亡也善兵者當窺識數子之不逆勢不輕舉而又能致人于必用之處是得用因之根本矣所謂因人之勢以伐惡則黄帝不能與争威因人之力以決圖則湯武不能與争勝故能得其因而乘其因者則萬軍之將可擒四海之英雄可制也言兵者動輒誇淮隂能驅市人用烏合謂其致勝也有神術焉此不通乎用兵之本甚矣淮隂所處之時有可驅之勢有可合之機故因其時順其勢而鼓舞之迂誤之激烈之率然之死陷之使人無不怒目攘臂齊勇皆戰者何也蓋六國恨秦讐之深萬姓怒秦法之慘嗷然而若焦熱傾焉若苦烈雞犬不相寧貴賤不相憀不獨人之去秦而天亦厭秦久矣忽兵起山東項劉繼峙淮隂適際其時輒握其畧獨開孫子九地之竅乃因勢而驅之握機而致死之是易于啟發耳假使彭黥而亦識此竅則淮隂又未可恃以必能也臣是以知淮隂生于斯世欲廢兵本外節制抗監司驅市合以戰而必勝以攻而必取吾斷未敢爲之許所以因時順勢而利導之者能者之事也悖人逆天而抗時勢者妄者之事也信固得其時順其勢而爲能者之事矣學兵之士當究其事之可否難易幸勿爲豪傑所欺笑焉孫子曰勝可爲也敵衆可使無鬭策之而知得失之計作之而知動静之理形之而知死生之地角之而知有餘不足之處故䇿者欲因其得失也作者欲因其動静也形者欲因其死生也角者欲因其有餘不足也使深間不能窺故因其間而爲我用也智者不能謀故因其謀以爲我計也勇者不能鬭故因其勇以爲我力也所以能因敵轉化用敵于無窮因形措勝用形于不竭車戰法曰車與步戰于易則一車能當步卒八十人戰于險則一車能當步卒四十人車與騎戰于易則一車能當十騎戰于險則一車能當六騎大約車用得法十乘能勝千人百乘能當萬人雖曰步不勝騎騎不勝車然有騎無車則一騎不能當一卒也務使步不離車騎不逺轂進退有制循還反覆得用車之法也凡車利結營尤便涉逺宜于廣易陽燥不利于卑濕窪洳所以貴髙而賤下進止須從其道焉其犯堅衆也必先走其雷電繼以小戎急出馳車或突或衝火亂其西弩射其東半騎半徒伏竒從鋒晦㝠不便謹壁勿攻車營被圍急擊有七敵人行伍未定前後未收急出輕車擊之士卒無常旌旗亂動急出武剛擊之不堅行陣人馬縱横急出火車擊之進退疑怯三軍互驚急出弩車擊之逺來亂合暮不能去急出沖車擊之吏貪務掠令不能止急出驍騎擊之敵陣既整輜積又多圍厚不解急出神獸車離合車霹靂車三方擊之出車有制握勢得機敵雖萬匝克之必矣所以欲擋戎馬之衝非車壁不可欲挫戎馬之銳非車擊不可欲逐套衛之衆非車攻不可欲彌隙塞罅而却戎馬之不入非車守不可欲出塞開邊以建不世之業非車行不可然用車之要總不外治力前拒整束步伍而已曠野最宜鹿角曠地則便軍車是以知戰車必不宜少用又烏可以不用爲是耶知節制竒正之用者必不舎是欲應變于倉卒間逺伐于數千里亦不舎是故曰非車無以致逺非車無以行制唯善用車戰者不拘限南北無拘山水無論重輕不泥分合是在用者之何如耳其可以車爲無益于軍用哉騎戰騎者軍之伺候便於犇衝利于速鬭踵我敗軍絶彼糧道便擊宼也然頓之則老宜于平易異于險阻林谷陂洳無令自苦是以用騎而必避之道因有八焉敵人佯走反我輕車夾我敵弩騎之致敗一也追北長驅逾險不止竒伏或起直絶我後騎之致敗二也地勢四守陷如天牢往入雖易退不可逃騎之致敗三也茂林叢木大谿深谷馳驟縶縲戰道窘促騎之致敗四也欲進而隘窄難從既出而迂逺難到彼之寡弱可以擊我之衆暴騎之致敗五也大阜在前髙山在後左右夾以阨塞敵處表裏戰必艱難騎之致敗六也既進而不能退隊逺而不能收敵又據我根本扼我陣頭騎之致敗七也沮澤漸洳草穢蕃蔓敵或現隱撲我聚散騎之致敗八也用騎而取勝之法亦有四焉敵人初至未到率然摧其先部擊其左右搗其腹心謂之突沖敵或整治兼有鬭心必謹吾翼騎倐忽往來進如霆震合如風雨揚塵鼓烟令白日昏疑以神獸襍以小戎宻更號令變化不窮謂之術擊敵處平易結陣不固據無險阻卒無戰心當急令驍騎薄獵前後翼擊兩傍斷其糧道以驟襲弛以夜爲晝其心必恐其敗不救謂之乘亂敵暮欲歸無制者其衆必襍令我鐡騎十而爲隊或伏或弛散而星布起如鳥飛繼以毒弩按弓發機敵雖百萬其勢必疲謂之威刦騎戰之機不外乎八險四利而分合聚散猶宜條理然非襍以車徒進退無本終以勢孤恐爲智者所笑故曰輕凌之隊竒伏之隊跳蕩之隊沖突之隊踵軍之隊遊奕之隊者爲其馳驟便捷利于邀擊犇趨而不宜于正守老頓也太公曰騎與步戰于易則一騎能當步卒四人大約十騎走百卒百騎走千人耳唯馬之所處必乘水草之便適饑飽之宜冬欲其温夏欲其涼勤剔毛鬛謹其四下齊其進止慣其犇沖調戢視聽使無驚駭人馬相親然後可使銜轡鞍勒必令完固况馬之爲病不傷於馳逐始末即傷于飲食失宜吳子曰日暮道逺必數上下寧勞于人慎勿勞馬常令有餘備敵覆我能明此者横行天下步戰大率步兵先立老營爲守然後分數處以聽指麾因變竒正雖襍騎隊出戰亦必迭更迭更之術叠陣法也故進必輕凌退必持重變化率然乃得用步之要其次務險其次務隘務險隘者握用寡之機也法曰步兵不能當車騎之蹂躪必依丘陵險阻以爲固廣易則用拒馬扶胥劍刃蒺藜倘一時拒馬不便即伐木爲鹿角營守者爲駐隊戰者爲鋒隊鎗筅鐮牌因勢而出布伏突竒必火必弩若能稍間車騎變以烏雲動即令人無措故教步戰之法起號即陣舉號即戰變號即易竒正臨戰而忘教習者斬之過險而畏進趨者斬之偶值形勢險阻須因地而爲方圓曲直銳之營以自持也只莫失于積卒握竒之㫖如韓淮隂之用死地李嗣源之救幽州張睢陽之用聚散掩擊岳武穆之野戰更番楊素之立陷陣令李藥師之作六花營吳璘之用三叠法戚繼光之變鴛鴦勢俱當爲步戰之紀而臣之連環因之二圖間以車騎亦可謂之有制然喊聲欲齊而震鼓聲欲重而沉戰氣欲揚而銳死心欲必而剛藝必求其精練兵必襍以短長司馬法曰兵不襍則不利故長兵以衛短兵以守太長則難犯太短則不及太輕則銳銳則易亂太重則鈍鈍則不濟學者能因其機適其宜而通變之是得步戰之妙步兵抵暮須列布城設拒馬環儲胥以爲營壁伍隊長旗上宜懸鐡線燈籠燈外有罩罩以油布爲之或便夜徙抑備襲偷如舉號罩起一望盡爲火城敵雖有見亦必驚悚其傳箭支更又在因時立制但夜營以至静至幽爲本水戰江上之戰必處上㳺水上之禦宜柵中流或因風縱火或因霪用灌或囊沙決隄或順逆故用毋自處不便毋自當逆風舟宜完而施轉便器宜捷而火弩先分更宜速栅寨唯堅旗幟須多張而數變戰士須輕佻而素練此水戰之機也將須達其機審其利不得其利必爲所害也故處水之軍絶水必逺水客絶水而來勿迎之于水内欲戰者無附于水而逆敵無自處于下而當客所以視其據隘察其所來凡與敵遇于大水之澤且止其旁急令登髙瞭望必揣水情得其廣狹淺深乃可決策敵若涉水半渡薄擊我不欲戰拒水阻之我必欲戰故去水稍逺上雨水沫至我欲涉者必待其定也敵船鼔躁而矢石不交者兵器必少也敵鼔促急而徐疾失度者衆心疑懼也敵令小舟往來不定者必有謀議也敵既進而復退者探而欲襲也敵泊而揚㠶者欲出我不意也敵火夜明喧呼不絶者恐而少備也敵火數明寂静無聲者治器欲戰不戰即走也敵近村落而不登刼者必有所怯也敵未困窮而求降請縛者必有所圖也他如敵鼓無韻爲僞聲敵兵不動爲偶勢此庸將之所不籌而智者必反其所計習水戰之令臨汛官兵無得脫衣夜卧無得擅離本船凢角掌一號炮响一聲擂鼓一通吏士皆嚴肅器具聽令而去角掌二號炮放二聲擂鼓二通吏士各就本部旗旛魚貫擺列角掌三號炮放三聲擂鼓三通大小戰船依次進發左右前後毋得攙越臨戰而忘教習號令者誅之遲行緩到及退縮不至者斬其捕盜遇淺稽遲者斬其扳招手雖先到而不直射敵船或傍擦及使風不正者斬其舵工繚手前船與敵交鋒而諸船不助致敵突走或陷先戰之船者旁觀後到捕盜船工俱斬之敵船故棄物件于水兵士戀于撈取而不追戰許捕盜割其耳回兵之日誅之同船隱者連坐一船勝敵而諸船攢擠爭功不務分投追殺者以軍法治其捕盜同力勝者不在令内也洋海之戰所慮風濤不時及慮迷失向往當斗建爲正加四時之知識進退矣或昏晦之際則以指南車子午針分其南北故處水上之占驗與諸占家稍異者似宜記之如日暈主風月暈主雨風雨必從暈缺處來星光閃爍不定及雲起四下散如烟霧者皆主大風雲若車形及海猪亂起發風必猛東風急而雲起愈急者必雨最難晴夏秋之際海沙雲起即有颶風霪雨水際靛青色風雨連朝夕水面浮黑灰風雨時下來海燕成羣飛白肚主風黑肚雨日沒後起胭脂紅及雲若魚鱗者皆主不風即雨也单日起風单日止雙日起風雙日止風起早晩和須防來日多晝起之風慮其久夜起之風防其暴夜聞九逍遥鳥叫一聲風二聲雨三聲四聲斷風雨蝦籠得鯉魚風雨作不止水蛇蟠在青蘆梢大水直至蛇蟠處望上水稍慢望下水即至火戰唯善用水火者有震天之威故力不費而功倍之法曰行火必有因烟火必素具因者因天時之燥因敵處之荒蕪也具者具我之火器無所不備于軍中也若得其天時值敵之所處乃用我之所素具是以用火之法攷時審日必得其風順縱烟塵必取其便發火自幽致敵無救絶守去路勿令其逃如自犯火覆地雷霹靂火轟山砲之類悉皆神擊所謂發一機以殺百萬者也此雖出塞之天兵而亦守邊之秘事然中國之用又無往不宜如古之名將雄戰勢大戰功使敵無所措備無所抵抗者實無出于水火之利也故火器有陸用有水用有戰用有守用有伏用之不同火製有飛火烈火法火毒火神火之各異其勢在火其機在器孫子謂月在箕壁翼軫爲風起之日用亦無可據驗能乘天燥復得地機發其上風火具必務神巧便可稱善用火戰者矣若只拘孫子五火四宿未可謂其得火之用也火之最難其法者在種火走線如地雷埋地數尺逺廣數里水雷入水丈餘沉伏港汊但藥線入土即潮入水即爛又烏能旬日數月之不濕耶火機一動而即發之耶况竹筒油蠟之類悉不能擋水此非巧過李載者不得其秘也其燒積燔營放箭打砲不過是遲速便滯宜與不宜巧法手法耳何足道哉所以善製火者有不傳之秘善用火者有心得之巧凡火發于内則早應之于外萬一火發于外者又當隨時應之無待于内發也火發而敵不動者必有恃也或空營也宜少待勿攻看其火勢内外極盛亂則從之静則自避如我入敵境偶經蓊蔚之所又在燥時且值暮矣必先削去營前最茂設若燔我上風當令我軍寂然不動亦以火燒營前之草使兩火相遇草盡火滅彼見火發而我軍安静疑不敢進懼而必驚驚而必退急令毒弩神器按黑伏于必由之路授以宻號八面角起鼓躁亂擊使敵莫知所逃是謂以敵火而反其敵用者耳夜戰夜戰之法或伏或邀或聚或散發號即行起砲便戰金之而止鼓之而進掌號隊分吹角陣變務于精少必得鄉導益以火鼔亂敵部伍一徐一疾動静安機敵莫知我之去處亦莫識我之分移敵如静固故致其疲敵將亂躁直入不疑凡夜以車爲壁以步爲守以騎爲候籌箭暗支燈炬有製須素令各卒熟認本營隊伍字號設或進退各分忽然舉火則辨别明如白晝錯悞者斬之須慮大風暴雨忽作故陣于爽塏以防水沖急出候騎嚴備掩襲及觀道路險易之情敵人必走之徑若與對壘或去營百步每燃火數堆暗地可見敵之向往風雨則以松節纜把爲之設欲遷移預立空營數處營外各有伏也大抵夜營宜静在智者必息火鼔及所防備之策又無處不周匝耳古之名將驍雄每務夜擊謂其銳寡可以破堅衆疑伏足以懾方張所以用兵之妙妙在夜戰然夜戰之卒非亡命不可也非神術不可也非積盜不可也非强梁無賴不可也將非驍悍不可也非果敢不可也非變通不可也非絶技潑膽不可也能識是機握是竅敵之勇也無所恃其勇敵之固也無所恃其固敵之衆也無所恃其衆風亦可進雨亦可馳㝠亦無碍晦亦自宜其制勝也必使敵之無以逆料抑使敵之無所不疑山林澤谷之戰孫子曰處山之軍絶山依谷視望處髙無登戰壟又曰養生處實軍無百疾大抵好髙而惡下貴陽而賤隂也所以山戰宜居髙阜近水草通粮道握形勢以便擊刺故山上之戰不仰其髙焉凡屯于髙山而四面受敵者爲戰隆則爲敵所棲矣屯于中窊而四面山髙者爲天井則爲敵所困矣在智者故不爲人所羈棲亦不爲敵所圍困前後險峻山水深大之處爲絶澗周迴險阻急難退出者爲天牢草木䝉宻不便驅馳者爲天羅泥途坑阱車騎陷沒者爲天陷兩山相夾澗道迫狹一人守之萬夫難越者爲天隙行軍遇此必急去而逺敵若遭之相機絶擊兩山夾近者爲隘形我若先居必須塞滿隘口作陣列勢以待若敵先盈塞陣而待我不可從之如隘處未盈行列未就急擊勿疑太公有林戰之法以弓弩爲表㦸楯爲裏矛㦸相與爲伍樹木疎處戰車居前以騎爲輔更戰更息各按其部臣謂林戰則車戰必爲之困矣矛㦸又何能施之必須速謹出入各奮短兵斬木開道便利我行毒弩烈火迭進互更審向察道妙在晦㝠左右前後逺索敵情半伏半擊獷猤騰凌敵雖有見莫得我形故林戰與叢戰相侔而利害相半也軍絶以爲當避茍或遇之勝在人耳晝益旌旗旛夜益笳鼓無慮其强必威其火法曰處斥澤之軍惟絶斥澤亟去無留若交軍于斥澤之中必依水草而背衆樹臣謂若交兵于斥澤則勝負未可知也莫如翼出驍騎展開道衢整陣結伍且戰且行必謹遊殿以備敵情敵若强梁急據髙阜兩軍角之必有利路其堅舎環龜之說未可即處地狹山髙左右壁陡率與敵遇兩不便走故彼不能來我不得往吳起謂之谷戰雖衆不能用也須巧設伏竒利在急出選我輕足之卒以登髙陵必死之士以開前徑或分車步四旁伏定敵必堅守營陣不敢輕爲進止乃急出旌旛移營谷外半隠半出更畨挑之且擊且擄總以驍騎列彊弩而衝接短兵而鬭臣謂行軍而值山林澤谷險阻是爲伏奸之地控制之所須疾過无緩設或陡然遇敵必觀其治亂而擊之也如不可擊只能謹我部伍齊我進退敵便不能爲我亂耳兵法以處陸之軍右當背乎髙阜死地當在軍前生地當在軍後然亦有故置死地于軍後者又曰丘陵隄防必處其陽而右背之是太鑿矣唯善兵者自不拘執何也蓋精銳之兵勢不可禦其鎮静如山林其流利如江漢其威烈如雷霆雖歴羊腸過鋸齒緣髙山入深谷涉大澤渡重淵而亦必不敗者則人人无不騰凌張膽一絶乎疑慮堂堂然決戰而去所謂致之死地亦勝也致之險地亦勝也致之陷地亦勝也不能用兵者雖處生地亦必死之雖處安地亦必危之雖處勝地亦必敗之何也人事之不齊所致耳故曰天時不如地利地利不如人和唯能盡諸人事者自得地利之用自合天時之宜風雨雪霧之戰風雨雪霧之際最難用兵此智者之所深畏而勇者之所怯出也唯能握其機而善克其事者又在此際爲必勝何也疾風暴雨之時人皆爲我不能戰大雪重霧之際人皆爲我不能攻其備自弛其心必懈若乃克其事握其機斟酌以致勝之畧闔闢以必勝之權懸千黄金萬户爵而復信之以必死之刑而故置之以必死之地所以率衆寡而衆寡用命馳强弱而强弱一心赴必死而必死无畏自是而一當百也以一而當百則无不可勝者矣但今之時將无能致此術耳人言戚繼光能之臣每究其浙閩用兵方畧不過稍識其毫末若謂其能集古名將之大成應機宜以不測則臣未敢以心許之也所謂用兵之勢如轉圜決勝之機如發弩謂圜者无一定之方弩者有抹電之迅然又不可无一定之主抑未可以必迅者爲之機是在智者隨時變化應命于不窮也如營陣定而雨不止馬沒蹄車陷軸步䠥􅍷滯進退妨馳逐此士卒之灾也其死生呼吸係乎能將是以安營必得髙燥先濬水渠必守界道者正防有此方進戰而當地險又值怪風陡作淫雨如傾飛沙障天怒霆奪魄此鬭戰之灾也其霎時勝敗務在得機故風順當縱火驟進乘勢搗之風逆須劄定陣基以待迫我嚴令固壘止衆勿進此亦用寡之時也俟天變少間審勢相機敵若備嚴謹守勿出如我治彼亂以輕銳撓之而大陣不得妄動也敵或順勢迫我須令驍騎先馳徑道從夜焚燬其積聚撲殺其老幼敵見根本有失勢必退崩取亂擊之此其大概也如山寇海夷并中國之盜慣在颶風忽作淫雨不止重霧不開大雪深厚之際以爲得志何也蓋南軍守以木寨戰以散卒陣无壁車出无候騎以脆弱步兵遭此天變自顧且不暇何能遍守險阻設若預備少疎寇必乘疎掩懈猿扳蟻附而入焉况道路素知入即得志不已也北兵之來闗鄙重隔而聲息先聞一當雨雪不便長驅猶易爲防戒耳唯大風重霧亦其乘勢伏昧拆牆奪險時也善守者自宜識之然亦有因其時反其勢以致勝者故曰能握其機而善克其事者又在此際為必勝陣紀卷四
