body:
  text: 陳紀卷二明何良臣撰竒正虛實伍束而後陳定陳定而後節制行節制行而後進止熟進止熟而後竒正生竒正生而後變化不竭惟變化不竭者乃能致勝于無形淮南子曰竒正相應若水火金木代為雌雄斯言是矣故靜為躁竒治為亂竒飽為饑竒佚為勞竒而輕疾悍敢若滅若沒無不是竒也孫子謂出竒者無窮如天地不竭如江河要知善用正者亦如天地之無窮江河之不竭耳又曰善用竒者無不竒善用正者無不正正謂此也世之談兵者執以旁擊為竒埋伏為竒後出為竒選鋒為正先合為正老營為正有等庸將𣲖定伍隊正者只做正兵竒者只做竒兵皆非也善用竒正者不但使敵人不識我之竒正如三軍之衆偏禆之多亦不得預測我之孰為竒孰為正也故當敵處即為首為正為前衝在右即為伏為竒為輔翊在後即為尾為殿為䇿應然亦有首內之尾正內之竒衝內之伏尾內之首竒內之正殿內之衝又以輔翊䇿應互易正正而竒竒也于是竒正之變秪以聽號視旗辨别火鼓而率然之出無不可為首無不可為尾無不可為伏亦無不可為竒正所謂立定陳成舉號即戰烏有一定之則而拘于方色前後耶故曰存亡死生在枹之端既知竒正相變之術便可得敵人虛實之情竒正所以致敵之虛實也敵實用正敵虛用竒理勢然也敵意吾正以竒擊之敵意吾竒以正擊之敵意吾出竒內之正而吾出竒內之竒也敵意吾出正內之竒而吾出竒內之正也敵意吾以竒正必變故竒竒而正正之也所謂形之者以竒示敵非吾正也勝之者以正擊敵非吾竒也故善用兵者必使敵人不識我之意孰為正孰為竒是以我常實而敵常虛我常致人而不為人所致但敵之意我何由知故曰端末未見人莫能知能因敵轉化動而輒隨者發機于無窮之源乃可謂之得敵意乃可謂之善竒正李靖曰凡兵却者旗參差而不齊鼓大小而不應人喧囂而不一此真敗非竒也臣獨以為不然善用兵者正使旗之參差鼓之不應語之喧囂退如山墮走若潮崩似果敗矣敵必欺凌倐忽變號出竒內之正用正外之竒敵雖有見亦必墮我之所不齊所謂以詐而施等類則有幸與不幸焉靖曰旗齊鼓應號令如一雖却非敗必有竒也臣意亦以為不然如節制之師進退有度雖敗必整雖退亦治乃息鼓偃旗反前為後似奔不奔似驟不驟勢似出伏敵必可售所謂以詐而當節制則必知其自聽矣是以得節制竒正之用者神乎心故能形人而我則無形也烏在乎真敗不真敗間生測度哉李靖曰善用兵者教正不教竒似亦誤矣竒而不教則號以無别變何以施孫子謂竒正相生循環無端安有不教而能相生無端者耶唐太宗問曰竒正素分之歟臨時制之歟靖曰按曹瞞新書已二而敵一則一正而一竒已五而敵一則三正而二竒此大略耳士卒未習吾法偏禆未熟吾令則必以二五之術使其各認旗鼓迭相分合此教戰之法也教閲既成衆知吾法聽將所指如驅羣羊孰有一一二二為竒正之别哉又曰素分者教閲也臨時制變者不可勝窮也衛公此際似得孫子用竒正之理然又既言烏有先後旁擊之拘又謂大衆合所為正將所自出為竒鑿矣惟無不正無不竒斯言乃得靖曰非正兵無能致逺非竒兵無能致勝乃有治力前拒束部伍迭相為用之說此又指車營為正兵步騎為竒兵也似非無不正無不竒之本義耳又曰正而無竒守將也竒而無正鬭將也竒正皆得者國之輔也更又鑿矣殊不知竒正原不可分惟臨時因用才有竒正之名若以用正用竒竒正皆得而分守將鬭將國輔之别則臣不敢服也觀其說屢變其意數更似談兵者流非用兵之傑也否則僞書耳末引握機握竒無三法在學者兼通稍為可解他如用兵之道先正而後竒先仁義而後權譎二語極當法云有正無竒雖整不烈無以取勝也有竒無正雖鋭無恃難以控禦也所以正兵如人之身竒兵如人身之手伏兵如人身之足三者不可缺其一三者能俱出而旗鼓祕之是為神化故三分其一為竒伏然伏豈獨以兵疲食少為虛哉主明將賢上下相欲感激既深意氣俱起是為氣實豈獨以兵強積廣為實哉故勝在得機敗在失氣氣實則鬭氣虛則走勝兵非常實敗兵非常虛虛實之氣係乎人心是以明將常得而暗將常失也明戰畏其實偷營慮其虛羣鳥集其上烟嵐踈其中鼓鐸之音不節凑者空營也旁必有伏無伏者遁也當謹我聚散止我號火速出伏中以免覆我設有旌旗亂而陳數移將離卒而心恐悸道險狹而渡半涉敵逺來而地未得疲奔命而炊未食失利便而行未息敵已虛也當選鋭分兵相繼襲擊所以見敵之虛而急攻其危者得其虛之用也然亦有虛虛實實之情隱然未見者我則虛者反其實而應之者以虛也實者反其虛而應之者以實也此又握虛實之竅而致用之以神衆寡用衆宜整宜治宜分則利于平易便于正守妙在進止移抽所謂如山如林如風如雲正正填填雷霆怒天者用衆之勢也用寡宜固宜輕宜鋭則務于隘厄避之于易變化不厭煩數所謂進不可當退不可追齊力一心死且不北者用寡之勢也故曰用衆者進而止之用寡者進而退之所以識衆寡之用者勝吳子曰以一擊十莫善于厄以十擊百莫善于險以千擊萬莫善于阻是故善用衆者必務易用少者必務隘尤宜于日暮伏于必由巧在偷襲擊虛利在未舍半涉耳衆寡之用法固稱難而尤當識衆寡之治也求衆寡之情也審衆寡之敵也孫子謂治衆如治寡者無所不任人也是以任力者勞任人者逸善任人者總其綱則萬目張握其紀則萬目起雖治千百萬衆何以勞為故曰任人者多而不勞民誠而從令也其民雖少無畏民僞而不從令也其民雖衆而寡將衆而用寡者勢不齊也將寡而用衆者用力諧也其勢不齊其用力諧皆由政令化之使然耳其誠與僞實在為上者作之如孫子以三萬勝吳起以五萬雄管仲以五萬霸湯武以萬人王兵非不可用也民非不可附也不得其所以用之附之之方雖多亦奚以為故善用兵者不務多善附民者求諸已我寡敵衆忽被彼圍須乘其圍勢未固行列未定急出武勇以挫其來氣謬用譎怪示以神異風突電驅斂翼轉勢一擊亂之敵衆不治兵入敵境衆寡不當相持且久被圍已厚常令并氣勿亂待其少懈從其兵厚而不治處突出大抵圍師必缺缺之前面多有險伏兵厚處必敵根本之地也觀其不治而衝之者不但欲出更亂其營所謂一擊而百萬破此又在用者審識相機亦未可執其圍師必闕一語反為所陷姑記之以為通變云如敵入我境而被圍者又不同也敵衆我寡人心必懼進退之間或不應命無得漫行殺戮防有變也宜從容示好顔色開以必生之機示以必死之路則畏心消釋戰氣自生戰氣生也則衆寡未可為不敵然衆寡之勢莫以土地廣大兵馬蕃盛就為衆也但分處多便無處不寡矣即如敵漫九邊各有部統勢似不多羣敵心合便覺衆強故善用兵者能分合彼此之勢使其各醜異心自相攻殺則衆寡可乘之勢因而兩用之矣率然所謂率然之勢者言其首尾顧應斯須不離腰不可斷首不可擊尾不可摧故曰率然如常山之蛇有率然之才者亦如常山之蛇自是應顧所以善用兵者無不率然何也蓋緣兵體將意將合兵情教因情措陳因地列氣自勢張勢從機發如心之役身身之運臂臂之使指動靜率然隨心而使雖風氣有南北之殊其應變無一定之理大約要節制素明教戒有自者必利急中之用自無意外之虞矣是以三軍行止必嚴隊列慎行伍謹甲兵哨逺近如一伍一隊一哨一營一陳之中或晝或夜但係火角銃炮齊鳴即是率然有急恐令不及下隨聽遇警之處隊伍營哨之長以二而三以六而四立定陳角舉手便殺左右鄰隊就是竒兵進退迭更人自為戰有驚營喧嚷誤舉火炮者須令靜待其亂自止有制之兵自無此咎我之隅落固密連坐令嚴縱營內有奸亦不能動臣謂軍中率然遇急之勢易為而天下率然有變之勢難措何也軍中遇急其節制機權在于能將而已能將之善任戰者率然如風之陡發如雲之陡合如轉圓石潰積水于萬丈之上使人莫識其來莫知所禦是謂握率然之用故能握率然之用者必能應變于不撓而又能以率然制敵之必不測也法曰恩與身先兵雄天下以是而知軍中率然遇急之勢易為天下有變其氷消瓦裂之勢以前古鑑之則有五危焉曰亂民也曰罪棄也曰荒淫也曰四夷也曰權篡也亂民之所起起自凶荒衣食迫之罪棄之所起起自貪吏殺人無罪高才不用明時荒淫之所起起自君上好奢佞幸用事四夷之所起起自戰守不明控禦無制權篡之所起起自威權日移樹黨交私有一則國貧有二則國亂有三則國危有四則國分有五則國滅一者五之漸也設或有一則五隨之矣茍不幸而生此率然遭變之世雖賢智之才班布而起恐亦不能以率然為捍禦將有驅不教之民以勤王事者出焉或喻之以必生或繩之以死或激之以忠孝或重之以功名猶未識其所應之機能為必勝否也以是而知天下率然有變之勢難措惟聖君良相能慮患于未形措置于有道自足以弭率然之變耳昔吳起以饗賜激勸之法行之日久秦衆犯西河魏士聞之不待將令介胄而奮擊之者以數萬計今也將吏憊于監司中制之煩士卒疲于科尅工役之苦偏禆困于謀求奔走之勞則士氣何由而作教戒何由而施所以將之良能兵無練鋭縱竭盡民膏以飬兵將實無益于率然惜乎臣謂斯時也非商君之變法不可以言守國非尉子之連刑不可以言治旅以下器具矩式製法用法别載利器圖考技用古者旌旗幡幟幢葆旐旗不過束伍司方使士卒别認本部之進退為分合之指麾耳故曰所麾從移所指從死者是也原無異巧之術後世繪諸像者詭道也出生尅者厭法也嗣而畫熊彪獅吼以彰其猛鵰鶚鷹隼以彰其擊星辰日月以彰其明雲龍風怪以彰其不測故伍有伍旗隊有隊旗門有門旗角有角旗官旗將旗司命豹尾高招轉光坐纛號帶金鼓清道之製大小方色雖殊而名則曰旌旗也他如五方五帝旗二十八宿旗三百六十日神旗雷門十二神旗司地十二祇旗支干丁甲旗八卦九星旗司天司煞異名譎像之類不可悉數尅土以青尅火以皂尅金以紅尅水以黃尅木以白得敵刳心以祭旗取血以釁鼓大率多方誤人示致其靈以彰我威也能兵之士當自識之又如坐罪人于白旗殺罪人于黑纛者總不外乎惑士卒之不知悚彼我之觀望然旌旗不可不多用也旌旗不多則威儀不嚴威儀不嚴則軍容不整又曰多用旌旗蔽我隊伍使敵不得登高望我動靜虛實也且旗為進導之司尤能遮蔽矢彈如南夷慣用毒弩邊箭鳥銃藥標到身即死是以南將多用健士麾旗當先翼兵馳進蓋緣弩箭彈標著旗即下自不及傷人也用法以旗桿過人二尺椆木為之旗用好紬上至鎗筒下及鎗鑽少尺餘以兩手托開隂陽拿住左右伏身盤旋轉繞鼓緊急趨先于髙招鋒交即止以讓短兵軍中響器則有銅鼓鐃鼓鼙鼓仗鼓鼛鼓鼗鼓鼉鼓之類用雖不同大抵壯逄􅣨之勢彰震天之威故出軍有釁鼓之法耳其大金錞鉦鐃鐸號笛笳管觱篥鎖叭哱囉板鈸梆鈴者齊心聽别晝夜用變率然之號而竒正進退因之以分合焉長六尺者曰角五尺者曰蠡蠡角之用亦皆神出沒三軍也許洞曰大將出師十萬宜用大角二十四面似亦泥矣如深入敵境欲彰其威盛者更須多用何妨凡射之理開弓須雄而引滿發矢須靜而慮周故曰心清也情逸也性靜也身正也力閒也審固也所謂從容閒逸射必中的又曰鏃不上指必無中理指不知鏃同于無目鏃雖至堅桿宜挺直弓須軟硬適宜而收貯最畏潮濕學射以十步立標標眼如錢大平肩滿射能三矢中二移逺五步又能不離左右即于二十步立標標眼如酒鍾面大平肩滿射能三矢中二移逺五步又能不離左右即于三十步立標標眼如燒餅大平肩滿射能三矢中二移逺五步又能不離左右即于四十步立標標眼如碗面大平肩滿射能三矢中二移逺五步又能不離左右即于五十步立標標眼大如碟面平肩滿射能三矢中二移逺五步又能不離左右即于六十步立標標眼比碟大一圍平肩滿射能三矢中二移逺五步又能不離左右即于七十步立標標眼比碟大二圍平肩滿射能三矢中二移逺五步又能不離左右即于八十步立標標眼大八寸平肩滿射能三矢中二移逺五步又能不離左右即于九十步立標標眼大一尺平肩滿射能三矢中二移逺五步又能不離左右即于百步立標標眼大尺許平肩滿射為率標之髙下須以逺近相稱雖立百步不過髙六尺是也武場比射以八十步立把亦髙六尺廣二尺許三矢中二為善射但力能至百步者當短五十步而發力能至五十步者當短二十五步而發能是乃得射之妙機馬射必以離把十五步而及者為熟又能以每把必發分鬃對凳抹鞦者為精竒奪險守隘非弩莫克邀彼方張非弩不可弩之射利古人尚之何獨不重于今世此可與有志于邊事者籌之也如絞車弩能射七百步大合蟬弩能射五百步蹶張弩能射三百步羣鴉弩發十矢飛鎗弩發一矢諸葛武侯名之曰元戎隴人呼之為摧山他如叄弓㪷子弩雌黃樺梢弩大連環弩跳鐙弩小合蟬弩自犯弩大黃參連弩大木單弩黃肩弩擘張弩毛胡盧毒藥弩猺獞濡縷毒弩八擔弩雙弓弩木單弩角弓弩伏逺匱子弩神臂弩神水弩克敵弩二意角弓弩交址弩彊弩積弩小弩小黃臺弩床弩連弩腰弩竹根戈之類不止數十種然弩雖一名其製其用各異如伏弩者藥非至毒未必能殺人鏃非至堅未必能透甲矢及即死方可稱弩萬弩一機乃得弩用故善伏弩者站頭髙下自準而矢亦勿令其虛發更藥須至急機須至幽用機之妙妙在從下從下者得機之用也敵少不必下機敵或當我而大敵在後亦不必下機敵進大半而發者謂之神擊如胡馬之雄必不能當半寸之鏃鏃及馬倒敵乃自斃故知用弩之功不下于火猶宜潛襲最便山林欲以輕騎往來利于小弩小黃腰弩神臂弩若將守壁據危須用絞車合蟬蹶張八擔比手弩以五十步立把髙五尺廣三尺許三矢中二為善射發能及飛走之目者稱精竒學藝先習拳次習棒拳棍法明則刀鎗諸技特易易耳所以拳棍者為諸藝之本源也如宋太祖之三十六勢長拳六步拳猴拳囮拳名雖殊而取勝則一焉溫家之七十二行拳三十六合鎖二十四棄探馬八閃畨十二短此又善之精者吕紅之八下綿帳之短打李半天曹聾子之腿王鷹瓜唐養吾之拿張伯敬之肘千跌張之跌他如童炎甫劉邦協李良卿林琰之流各有神授世稱無敵然皆失其傳而不能竟所奧矣扒扠長一丈二尺精者能入槍破刀唯東海邊城與閩中俞大猷之棍相為表裏法有不傳之祕少林棍俱是夜乂棍法故有前中後三堂之稱前堂棍名單手夜乂中堂棍名隂手夜乂類刀法也後堂棍法夾鎗帶棍牛山僧能之諺云紫微棍為第一張家棍為第二青田棍又次之趙太祖螣蛇棍為第一賀屠鈎杆西山牛家棒為次之其孫家棒又自宋江諸人之遺法耳大抵練兵教藝切須去了走跳虛文但動棍須把得堅交棍妙在下起棍入必須上壓一打一揭欲我疾隂手陽手令人疑大剪小剪神變用大門小門藏正竒使拔剃滚殺起磕俱得其妙乃可稱棍俞大猷劍經曰待其舊力略過新力未發而急乘之似得用藝之祕矣棍法之妙亦盡于大猷之經在學者悉心研究酌其長短去其花套取其精微久則自可稱無敵也馬家槍沙家竿子李家短槍各有其妙長短能兼用虛實盡其宜鋭進不可當速退不能及而天下稱無敵者惟楊氏梨花槍法也所以行有守立有守守內暗藏攻殺之機變槍鋒須短利而輕以不過兩為率桿須腰硬根粗稍稱凡學槍先以進退身法步法與大小門闂闂串手法演熟繼以六真八母二十四勢的厮殺使手能熟心能靜心手與槍棍法兩化動則裕如變不可測但施于陳上則伸縮騰挪之機少稱不便故花法不必習習亦無用也此在學者自妙而通用之惟山東樊氏深得其傳惜乎老矣較比之時先看單槍試其手法身法進退步法闂串不宜甚大尺餘便好然後二槍對試真正交鋒復以二十步外立木把髙五尺濶八寸上分目喉心腰足五孔孔大寸許內懸懸木球每一人執槍立二十步外聽鼓聲擂緊翻然擎槍飛向前戳去以得孔內木球于槍尖為熟其五木球俱得為精故曰能殺人于二十步外者長槍也筅之出入頗稱不便似非利器也所可恃者能作步卒之籓籬耳然非長槍短兵夾持而進則所為能禦而不能殺者也故學筅者必以老成有力而筋骨已硬之人謂其無活跳閃賺之勢如精鋭輕凌之兵必不以重贅之器為利器用焉筅之竹節須密而稱旁枝須堅而粗筅刃須長而利以火尉之或曲或直四面扶踈如刺如㦸炙以桐油敷以毒藥較閲之時先令其自使觀其手法走法六勢成熟之時然後與長槍對比槍哄不動又能護我短兵進戰搪架敵器不入為精藤牌宜堅大而輕使之蹲下可以遮一身有餘凡學先從八勢曰賴禮衣勢斜行勢仙人指路勢滚進勢躍起勢低平勢金雞闖步勢埋伏勢八勢既精自得其巧是以攬牌如壁閃牌如電遮蔽活潑起伏得宜全身藏盡視聽外馳更須翻滚不露頭足此用牌之要說耳然非標子無以用也故學牌者先學標每帶二標數枝起手時左手挽牌右手持標步動標起近敵便投標起敵必閃顧則牌隨隙滚進使敵措手不及為精設若敵不為標所動亦必為標所傷矣故曰標者牌之疑兵又所慮者恐進標而抽刃不迭此用牌之大病也習者慎之較比牌標之法懸銀錢三箇于三十步內滚牌進標如臨敵勢標中銀錢者以銀錢賞之三限不中者罰而復責唯三標百試不差者為竒異長牌主禦駐則成營行則蔽隊僅可作營隊之藩衛也所謂壯士氣齊部伍退如山進如堵然非長短之兵雜而用之則不可恃長短之兵若非牌蔽又不能以節其利故曰得長短剛柔之用者不敗也牌蔽髙廣過人可以搪前遮後護足止馬但鉛子竟入無以為禦戚繼光曾以絲綿數層製度牌上名曰剛柔牌以拒鳥銃終不能擋總不若練荆花鎧法為妙鉛子著之自下但人鮮得其製耳軍中諸技惟刀劍法少傳但能使長短兵不及遮攔便為熟矣如日本刀不過三兩下往往人不能禦則用刀之巧可知耳偃月刀頭大且重使有力者用之而更能精熟三十六正刀二十四門伏則諸兵仗當之者無不屈也馬上雙刀須長而輕後過馬尾前過馬頭為要劍用則有術也法有劍經術有劍俠故不可測識者數十氏焉唯卞莊之紛絞法王聚之起落法劉先主之顧應法馬明王之閃電法馬起之出手法其五家之劍庸或有傳此在學者悉心求之自得其祕他如鳯刀三尖兩刃刀斬馬刀鎌刀苗刀糜刀狼刀掉刀屈刀㦸刀眉鋒刀鴈翎刀將軍刀長刀提刀之類各有妙用只是要去走跳虛文花套手法始得用刀之實故曰不在多能務求精熟設或不精反為所纍所以祕技有神授如無真授未可強為授之不精或技精而不能變猶為法之所泥短兵者為接長兵之不便然亦有長用也馬叉有突越之勢綽耙有閃賺之機然叉亦不出隂陽耙不離五路如燕尾叉虎尾叉五龍耙三股叉耙尾鞭丈八鞭雙鈎鎗連珠鐡鞭鷹瓜飛撾開山斧銼子斧鈎鎌㦸鐡鎲鈎竿天篷鏟搗馬鎗蒺藜椎鴉項鎗魚肚鎗狼牙棒豹尾鞭蘆葉鎗流星椎又芉㧓鎗鐡簡棨钁擲逺鐵梧環子鎗㧓子棒紫金標八尺棍之䫫不可悉數各有專門但身法手法步法皆由拳棍上來其進退騰凌順逆之勢但有異樣神巧學之得精俱可制敵然非祕授不可強施外如花刀花鎗奪棍滚叉之類誠無濟于實用是以謂之軍中之切忌者在套子武藝又所最恨者強不知以為知鳥銃出自南夷今作中華長技妙在打眼圓中神在火門急迅利在藥細子堅中在腹長照凖裝藥竹筒火繩信鱉匙鎚通杖油單須隨身懸帶有臨場遺失藥不燥乾即連坐以法火門損壞藥彈短少即禀修漆較演以八十步立五尺木廣二尺許上懸鐡片如人頭大中間懸球為心腹大三發二中其頭腹為熟三發三中為精但不可連發五七銃恐內熱火起且慮其破惟倭銃不妨今有以竹木代之甚是輕便又在製者得其巧則得其妙用矣其所畏者鍊荆花鎧南島油漆兕條甲濕布幔耳火箭古稱神器而南北俱宜功不在鳥銃之下但軍中久無製之妙者若造作製放手無法徒費而無所恃也大抵紙間礬油以避濕藥須極細而築實線眼用鐡桿打成更要至中而至直如筒長七寸眼須五寸許火箭桿要直翎宜徑羽去徑二寸稱平此其訣也比試以八十步立把平去能中為精歪斜起落不入把者治造法不精責其匠然亦有用強弓較車豁竹射送者妙其火則後出少而前出多故利于燒積聚耳子母炮者功在悚敵之馬驚敵之營亂敵之伍奪敵之氣須藥線不誤放手慣熟為神所畏者母炮未發而子炮先聲則傷本處人矣或至半途而炮發或至敵營而火息則炮無益於用矣故線似螺螄旋轉令不相見賽貢銃者竹木俱可為之長三小尺而鉛子合口約重半斤平卧地上以墊頭髙下得宜放之且不用木馬故神于佛郎妙于發貢亦軍中之利技耳火之得用者如火磚火毬火盜火妖火獸火牛星鳶蜂豕火騎雲龍烟毬藥桶神彪火屏牌銃牌箭遊龍號鴉灰瓶火船毒烟毒火緣油鯢油火鵬火鷂合炮火樓火兵飛炬火塹火牌十子銃九龍槍大蜂王大將軍覆地雷絞江龍絞地龍轟山炮混天炮流星炮净江龍攻戎炮旋風炮天墜炮地樽炮五梢炮七梢炮天機炮返復槍自犯炮追􅀢箭迷􅀢炮一把蓮三隻虎風塵炮浮萍火單梢炮雙梢炮大窩蜂小窩蜂十丈槍七筒箭打陳炮插翅虎荔枝炮石榴炮地湧槍千里勝連聲炮葫蘆火衝鋒馬木石炮火龍刀火鞭箭鐡火床蒺藜毬先鋒炮火龍刀火龍鎗火焰鎗二虎追火龍口逐人鎗虎尾炮漫天霧毒藥火飛天噴筒毒烟噴筒神機火鎗旋風五炮纒身火龍驚風牝猪飛蛇逐馬五虎離山五色障烟飛空神砂獨腳旋風炮霹靂行火毬交鋒棄馬羣虎嘯風火龍爭勝遊鼠驚馬百鷹獲兔衆虎奔羊一母領十四子炮旋風狼牙炮月落星隨炮五雷裂山炮大裝囊燕尾炬之類約百餘種製式用法俱載利器圖考須因敵異用因地異施舉放燃線不疾不徐得法為妙顧宜預製于軍中以備率然乃可用也歌云用陳須兼車步騎用器因分南北利用人何似統賢愚用火得宜無不濟昔伍子胥教闔廬以舟師之戰大翼者當軍車小翼者當輕車突冒者當衝車有樓者當樓車走舸者當驃騎而後退鈎進拒之法以著故水戰利便利用之器具則有水平拍竿皮船水罌丫篙望斗鎌隂陽鑽燕尾牌虎頭牌發貢佛郎噴筒火箭鳥銃藥弩擲逺飛標火磚灰桶緣油硝黃械筏蒲筏簰筏浮囊水袋飛炬之類水戰利走利鬭之應宜則有䝉衝鬭艦遊艇天艎絶海飛江樓船走舸海鶻艅艎下瀨戈船沙船漁船梭船網船鷹船巨艦橫海追雲橫龍滄兕四輪舸兩軛舟八卦六花船鴛鴦漿子母舟破敵舸髙把梢船開浪船蜈蚣船八漿船大頭船尖尾船大腹船蒼山船艟􅬋船兩頭船草撇船海滄船廣東船水虎捷水虎翼叭喇唬混江龍犁雲虬飛海龍赤天艘鐡海青四跳三櫓之名率皆古今水戰之長技有用而捷者有用而頓者其風濤順逆之勢港㲼大小之宜江海淺深之用此在明將審勢相機因時變用不可拘也然不佐助以火弗易有功故曰軍中大利用者必在水火大為害者亦在水火不仗水火無以見崩天裂地之勢固在用之得宜與不宜耳車者軍中之羽翼始于軒轅盛于三代用以陷堅陳要強敵遮走北也故太公製武衛大扶胥者輪髙八尺以二十四人推之可陷大敵也武翼大扶胥者差小于武衛輪髙五尺以一十八人推之可比鋭師也提翼小櫓扶胥者又差小于武翼用以獨輪大黃參連弩扶胥者又稍大于小櫓伏以飛鳬電影皆可以摧堅破强迎遏大勢嗣而武王之製戎車宣王之製元戎楚子之製二廣晉人之製五乘衛青之製武剛車馬隆之製偏箱鹿角車馬燧之製冒戰車衛絳之製如意車黃懷信之製萬全車王大智之製雷電車洪武四年亦令造獨轅車永樂宣德中亦增其製近如談司馬奏造兩轅車于京營蠢重失製運轉艱難無益于用也迄皆糜費惜乎他如狻猊軒神獸車橫陳車翼虎車自行車必勝車火箱車雲軒車行炮車霹靂車轒輼車旋風炮車各樣大小弩車各樣大小炮車刀車鎗車撞車絞馳車闕車衝車大油車輜車棄飛車象車天梯車離合車蹲獅車伏虎車帳幕車三轅車輕車小戎木牛流馬騎冠牌車流車之類古人用之歷能霆擊風馳何往而非取勝獨不用于今時何也豈匠不能製而地不宜用哉不能變通其用者必以山水形勢不便為說今之山水即古之形勢其宜與不宜又不待辨而自明矣昔以弩衛車今則益以烈火弩有毒藥火有神方而車有異製其功固十倍于古人又可見也當事者不言運用之不能變通而謂車之無益于用難矣識者謂制敵先制馬制馬必以車又謂破敵非難難在車製戰而無車猶身之無甲所以北敵之勇悍北騎之輕慓非車無以禦以牛馬驢騾代人之力者發機于前故不為妙設有巧思者能發機于後或中或傍斯為有勢是得其善矣大率製車以朴素渾堅活潑機搆思宜巧法宜新是也若一時有急能令市上及農間大小之車俱可赴戰此又得用車之竅者矣飛樓望逺插板陷坑飛橋釣橋轉關鉏鋙誰何刁斗轆轤地澀天羅地網武落織女穿環暗門泥擂木擂風扇竹牌磚擂石擂地筍鐵屋劍刃儲胥搊蹄捉馬氈簾皮幔麻搭唧筒狗腳木箆籬笆埀鍾版拐子木夜叉擂鹿角木木女頭木馬子鐵蒺藜鐵菱角鐵撞頭狼牙拍鐵飛鈎闌干棒霹靂棒之類率皆攻守之具悉令備置于軍中可也如布城軟壁用于南方則野戰固有所恃用于北鄙則戎馬亦為之驚疑或軍行失道則以指南車子午針定其所向欲還本境乃放老馬引導于前軍圍八面欲知其進退當令城內八方鑿井深二丈許取新瓮以薄皮覆口如鼓使聰耳者如井中枕瓮而聽去城五百步悉知之矣或令少壯者枕空葫蘆卧幽靜處人行二十里外東西南北皆知之名之曰瓮聽曰地聰器具屢有異名如以鐵蒺藜為鬼箭以擲逺為飄石以伏弩為耕戈以火磚為滿地錦以竹片代銜枚以木城為壁壘之類不可悉數為將者固宜識之凡製器具務在精竒三軍生死相關家國存亡所係不可因中制而避嫌省費也須令匠作自製營中切勿推于有司致誤大事所謂負大計者不避小嫌不惜小費軍中之樂以圍獵觀進止之節然賞罰之令必嚴將帥之儀必整如戲劇音樂之類音必雄壯慷慨戲必馬步藝能凡無益于軍用之技無預于激烈之音者不可有也平時用技稱十分精熟而對敵之際能用出五分者不敗能用出六七分者必勝多有當場便忘了平素手段况生死之際乎且如長短器械錯雜陳頭一齊擁進起身就戳便砍雖轉手回頭尚不可得豈容活潑動蕩坐作進退身勢手法耶所以虛花武藝一些不可用在陳頭上正謂此耳練兵者若曾親經戰陳當識諸此然藝雖倍精于敵又不可失勢一失恐有隙可乘有隙可乘則勝敗未可定也陳紀卷二
