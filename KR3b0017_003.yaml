body:
  text: 陳紀卷三明何良臣撰陳宜天之積卒陳之宗也內外方圓左右顧應曲折參連互隱竒正備而至簡固而至整雖神聖握兵不外乎是故伏羲氏觀積卒而立五軍九營為師卦順靜臨險或不可測遂名之曰師卦陳也軒轅氏又發積卒之祕變師卦之體立天地風雲衡軸衝之義而成握竒陳也太公變軒轅之制畫為九區方諸井字而為三才五行陳也周公立伍兩卒旅師軍之法以六軍為正竒兵在正軍之外從兵又在竒兵之外而為農兵陳也鄭子元按周制以偏為前以伍承偏之後一軍二十五車則方勢而為魚麗陳也楚武王以山澤車少人多五十人為兩百人為卒十五乘為偏偏後别有遊闕以三軍為正列左右二廣為親戎而名荆尸陳也晉荀吳法周制而為前拒左右角每五分五方而立每兩每卒亦分五方而立地險則舍車為步步如車布五車隊隊之布如卒之布二十五軍為偏偏之布如隊之布五偏為陳陳之布如偏之布故車法起于步法步法不外車法而名之曰崇卒陳也吳闔閭以步兵三萬為三軍一軍分百行一行卒百人列成方勢以白為中以赤為左以黑為右唯取相生之義不施詭譎不練戎車故不能抗于中國後巫臣教吳以偏乘之法以罪人居先三軍居後以步卒居先戎車居後與楚戰于雞父因有雞父之陳也管仲更周制以三萬人六百乘一軍各五旅小戎各四十乘别有卒萬人車二百為竒兵而分先驅由驅啓胠廣戎駟乘大殿八名故使人相疇福相共居同樂行同和死同哀而稱內政陳也以是而入孟門登太行張武軍封少水一戰而服三十餘國焉司馬穰苴廢管仲五偏而行周公五乘復黃帝之握竒以萬二千五百人取十之三為竒兵布之中壘取十之七為正兵布之外營名之曰握竒營陳也齊孫武因伏羲師卦內外俱圓黃帝握竒內圓外方乃變而為內外俱方取河洛經緯之義八八相乘為六十四竒正分合大小包容復配以鳥蛇龍虎而為乘之陳也戰國巧士以象棋三十二子倍之或方或圓內外四層而為象棋陳也韓信以三十萬人分為五軍孔將居東南而為左費將居西南而為右自將前軍居漢王之先鋒絳侯柴將軍義居漢王之後而成垓下陳也諸葛武侯乃原握竒因乘之推河洛之方圓寓井田之遺制分四竒四正以西北乾位故名天陳西南坤位故名地陳東南巽位故名風陳東北艮位故名雲陳東方屬青而為龍陳西方屬白而為虎陳南方屬火而為鳥陳北方屬水而為蛇陳大將居其中握四陳為餘竒别有遊騎二十四陳以繫八陳之後大抵陳隊相包竒正數别伸縮翕張進退有節為方為圓為曲為直為鋭或滚或歸或前或後合而為一列而為九變之無窮觸處為首名之曰八陳圖也晉馬隆循衛李選士三千二百人配車一百二十八乘三百人為遊奕依孔明八陳圖而為四層路廣車上以木為拒馬向外結營而行名鹿角車營路狹更施木屋以蔽矢石木屋拒馬以低為式治力前拒兼束部伍且戰且進名曰偏箱車陳也李靖六花本孔明八陳而變其中隅落鈎聨曲折相對無不參綜古法步騎與車三者相兼而用以車曰駐隊步曰戰鋒居前為正騎曰戰隊又曰跳蕩居後為竒名之曰六花七軍陳也隨其地勢去其中營而變為曲直方圓鋭五圖而名之曰六花曲陳也六花直陳也六花方陳也六花圓陳也六花鋭陳也若遇險阻仍用七軍向背得法作偃月營其征遼也乃結束七軍為四團方楊髙祖之制為四門斗底陳也其征突厥時因乘之陳法復變六花為十二以四竒八正首尾相因行止相隨生死同義名之曰十二將兵陳也其定邊時雜蕃漢之兵而用之外營十二陳皆步而騎各包步卒之中一騎各當一正一正不離一竒一陳受敵各自為戰竒正相混使人不知所謂無不是竒無不是正而名之曰十二辰陳也宋太宗以車四千三百二十乘騎三萬六百五十匹步卒一十四萬九百三十人布為五陳各以二行為表裏中以三陳相從為輔弼故五軍而有七陳遂名之曰平戎萬全陳也宋真宗之長陳有先鋒隊策先鋒前隊東西拐子馬後有拒後陳內有無地分兵隊大約與萬全陳少異也凡用步兵欲以寡鬭衆弱勝強者無如李陵之馳驟韓信之輕凌張巡之聚散嶽武穆之任機楊素之推陷吳璘之三疊戚繼光之鴛鴦而臣之連環因之數十勢而已然皆參古法而今作但其用變取勝各有神異此在學者變通之耳能將握步根本練之精出之熟變之神自可驅步卒橫行而無敵也故善作陳者無一定之形必以地之廣狹險易即據方圓曲直鋭而因之可也又從敵之衆寡強弱治亂而因之可也至于我之多少重疊或為犄角或分五行或列三才却在隨時布演務須首尾相顧必應表裏隊陳有容形名各别衝之不亂撼之不動斯為有用是以出正兵不外三疊法出竒兵不外奮前蛟二勢耳地窄只用一伍地廣便用十伍百伍千伍萬伍亦可也地窄只用戰隊地廣則加翼隊包隊伏隊應隊亦可也夫兵以進輕退重進易退難所以非鳴金不退茍退一如進法各以前隊之兵稍退立于後隊之後更畨止齊盡如迎戰之勢以備敵之乘我故止而齊齊而整渾沌而不亂紛紜而條理是為有制世稱武侯八陳曲而繁管子內政直而簡其説尚矣但言曲而繁者尚不知其何以為繁曲言直而簡者尚不知其何以為簡直唯以聲字相傳訛舛不辨漫浪妄談何可為式須將古人已成之制苦心求之巧思變之務令前後左右動無不利而後因時立宜舉其可用之法行之可也否則謂吾胸中自能行出千百萬陳不必方效前哲即我作始亦可也或不能變用古法而吾胸中又無自得之妙則僅僅循守節制以方圓曲直鋭五勢因地用之縱不大勝亦無大潰也談兵者若欲強執一圖穿鑿附會妄立繁曲直簡謂吾必勝古人足以應敵于無眹恐終不免為李希烈之縛耳談兵者每好穿鑿或假知兵之名而妄作陳圖為害深矣豪傑之士固宜識之如風后之握機陳者宋人所作獨孤及附會而記之也穰苴之握竒營者元人許洞之所作也孫武之方陳圓陳牝陳牡陳鴈行陳罘罝陳車輪陳衝方陳常山陳者皆唐人裴緒所作嗣而王氏分配八陳李筌附之而有天覆地載風揚雲垂龍飛虎翼鳥翔蛇蟠之名張曄配而為新變風揚陳新變雲垂陳新變龍飛陳新變鳥翔陳新變虎翼陳新變蛇蟠陳無天地二陳而為六焉再作太乙曲陳太乙直陳又併諸八陳分配天地風雲鳥蛇龍虎而復加之符呪詭鑿甚矣更以五行分配曲直方圓鋭焉又復變八陳六陳為鈎聨蟠曲焉又作十二將兵以配周制車乘焉又作當頭陳法焉作滿天星陳焉又作八翼陳焉又演馬隆偏箱車陳焉又演李靖六花陳焉又廣六花七軍陳為五花陳焉許洞曰敵以彎陳應以飛鶚敵以直陳應以重霞敵為突陳應以長虹敵圍四面應以八卦是雖作陳應敵之一端但勢在一面四隅無兵而中軍無握竒外列無伍法恐為智者出竒兵以搗心脅也他如許洞之穿鑿者不可類數大抵負誕好竒不究根本形勢日巧實用日拙若乃執而行之不免為武安君之所侮穰苴謂位欲嚴政欲栗力欲窕心欲一正縱橫察名實吳子謂賢者在上不肖者處下則陳自定矣若徒以形名機巧為宗而不信二子之所説猶未得作陳之祕也况可以竒名巧勢為穿鑿哉臣是以知二子得作陳之旨凡作陳須安而靜出而理輕而簡重而治變化前後率然進止車騎相因終以繼始故曰營陳靜治以為固甲兵堅利以為雄又曰車列得式騎步有翼徒步憑凌水潰雷擊然兵必雜以短長行列欲其疏朗士卒能以不浮戰鬭自致齊一其列不可疏疏則難應亦不可密密則難用大約步兵一人占地兩步騎兵一人占地四步故陳因地勢而立衆寡之則幡圖神怪以彰殺伐之威步雜車馬而變竒正之用若夫用步貴知變動用車貴知地形用騎貴知别徑竒道善兵者不外三才而用陳焉陳頭不宜逺過陳尾必識變更陳腹最須實整陳翼務使輕凌太公曰臨敵必置沖陳復以車騎分為烏雲臣謂沖陳者戰陳也正兵也烏雲者翼隊也竒兵也烏之聚散無常雲之行止不測以烏散雲合而變化無端故取義為烏雲陳焉有沖陳則有營陳矣營陳者大隊也沖陳出自營陳之中學兵者觀此可見用陳之則李靖曰車徒當教以正騎隊當教以竒殊不知車徒原不泥于竒騎隊亦可以為正曹操用三騎之法每回軍轉陳則戰騎當後遊騎當先以陷騎為應變此更畨自備之意得矣戚繼光曰列陳無難使人各識我陳為難人之各識我陳亦未為難使人之能用我陳為難所謂非知之難行之難也斯語似能作陳者矣臣謂雖能作陳用陳而不知駐劄營陳之吉凶善之半也故門宜向陽以受生氣不飲死水無營死地無居地柱無息地牢無處天竈無棲龍頭無當大谷之口恐敵所衝尤防決水無止大山之端慮敵所圍不利水草大將所處必從九天青龍華蓋常坐我前地無草木不集禽獸不可營也古城古社窑竈丘墓不可營也焦石砂礫水流逆行不可營也必得水流清徹為上黃黑濁者即投膠礬澄之水停不流慮有汚毒源在敵所無得輕食水流有黑脈散而不定者食之必死水多糞草人獸尸骸者食之必病須從傍鑿井宜得甘泉所謂軍井者指旋鑿之井也水流而盈減倐忽者上有壅囊之謀水止而波沮洳限于路者下有澤淖之陷水要在敵而無甲士守者或有隂伏之姦戰令尉子之重形令也所統千人以上有戰而北守而降離地逃衆命曰國賊身僇家殘去其籍發其墳墓暴其骨于市男女公于官所統百人以上有戰而北守而降離地逃衆命曰軍賊身死家殘男女公于官是故以守而破陷則一軍上下受誅以戰而敗北則一軍貴賤皆斬又曰能殺士卒之半者威加海內殺其十之三者力加諸侯殺其十之一者令行士卒儒者論兵以尉子為慘刻殊不知尉子者無地無天獨出獨入誠所謂一人之將也善兵者能會其意而去留之得作戰者之機矣今也民驕備弛戰士困苦而中制太過將乏賢能令輕刑賞臣謂非尉子之法無能新軍政起疲弊也乃減加其差等而為之令使戰令必行則士卒自畏士卒畏主將之刑則偏裨畏君上之死矣故上陳有保領牽制之法軍士保領伍隊長出戰無失伍隊長保領百夫長出戰無失百夫長保領千夫長同左右將軍不能誅偏禆將之不用命與無偏禆將同大將軍不能誅左右將軍之不用命與無左右將軍同大將臨敵而死則左右副偏禆將千百總伍隊長以至中軍近卒力士技士儲將謀士悉應斬之餘唯稍逺吏士有軍功者免死所以凡戰而亡其將吏頭領者所轄官并士卒皆死之將吏棄其士卒而逃者亦許諸士卒捕而殺之不捕者同罪陳亡卒而得敵二人者本隊免死亡一而得三四者賞之亡一而得敵十數者賞而復升其本隊隊伍之長亡一二而不得敵者本隊隊伍長并軍士悉斬之抵敵負傷而不死者以其全隊月糧賞不死之卒亡卒而失其骸者全隊家産通給亡者之家亡五十卒而得敵百人者偏禆將千把總伍隊長得以免死亡五十人而全無斬獲者偏禆將千把總伍隊長盡誅之如左右將軍以身保而立功贖罪而能奮死陷陳得敵百功以上者免之因而大潰敵陳者賞而復升出而無功雖左右將軍保者亦斬之其各將領財産盡給于死者之家然陳上回報首級一節法所當禁何也一報首級即起爭心而伍自亂敵必乘我亂也更無得取敵所遺財物一取財物自相攘奪而隊不肅敵必乘我疏也只應雷擊風行使敵無所措備敵潰之後監軍者紀其某陳當某敵某部勝某方某隊進趨某伍少却功罪應否明白乃發刀斧戕取其心自一而功自均也不但一心功均抑可免私殺平民報功之慘故有前軍回報功級者斬之除四夷外則中國之戰又不必以孜孜首級為計也固在任機權者臨戰應其宜耳未戰之前一二日士卒敢有畏戰逃者捕而殺之伍隊長不能捕者俱斬仍將同伍同隊之卒各打百棍若有知其逃情而不先首者亦斬有能首而密伏所逃之路擒捕其逃者即以所犯之糧并所犯家資賞之不實并誣者反坐如果陡病不能赴戰者聽本營官吏伍隊長驗入中軍調理詐者坐法誣人詐者亦坐或一卒一伍一隊奮勇抵敵而同伍鄰伍同隊救應稍遲致損奮勇伍隊頭目者同伍鄰伍同隊頭目以至軍士悉斬之或一部一營拚死鏖戰而諸部别營疏于備援致潰鏖戰之陳而損將失事者諸部别營大小頭領俱斬之其偏禆將千把總之分布策應原其地之逺近連坐有差卒能奮力陷陳而復得敵之頭領者卒當舉其為千把總或得其謀士及正副敵將者即當拜為偏禆將敵未入彀而伏兵先起敵已越彀而伏兵未發因而致誤機事者領伏頭目俱斬各兵捆打仍扣月糧竒正之兵見伏已起而不急應者同罪凡塘報夜不收哨探之類為人欺惑傳送不真因而誤事者斬哨探發行不知敵至者斬哨探不以敵情實告主將而反與同輩宣露者斬哨探既真逺近已的多寡已明險易已得唯聽主將分道發遣無許負氣先登貪功先動所以如期不到未令先行臨敵先退者俱得斬之大將慵于料理分措失宜隱賢蔽能引用不肖以致覆軍折將者監軍官奏斬其頭沒其三世監軍官偏執己私不和大將致誤國事者罪同分營别壘各有汛地上有左右將偏禆官下至材官儲將技士亡命以及伍隊士卒唯視聽主將進退合分號令各不得越界往來私相言語設有犯禁即治以法臨敵違令者橫門斬之故曰內無干令犯禁則外無不獲之姦矣所以陳定而足數移頭數顧行伍擠拶稀密不均前後紊次旌旗亂搖金鼓不節者所犯與隊伍長俱死之故舉號差錯則掌號者罪行陳失序則偏禆官亦坐臨敵而誤號者則掌號者當斬臨戰失序則偏禆官亦誅是以出越行伍爭前滯後不遵將令擅出入者斬之陳列已成從左右將以至監軍官而下俱毋得乘車馬入營違者斬之更不許私抽營內一人一騎役用抗者斬之無主將符契至而擅發兵者斬之符契既至而不即發兵者斬之失旌旗金鼓符節或為敵所竊者全隊斬之姦淫敵境及沿途婦女或匿婦女在營并凌虐所過人民者全隊斬之進退不遵金鼓旗幡火角號令者斬之倡言敵人威勢以悚其衆者斬之巫祝私為軍士卜其行軍之吉凶所問與巫者俱斬之主將進退密令出攻伐機事未行而有先聞者告與所聞者俱斬之結黨毁謗詭言妖異者斬之私察是非因而索利者斬之漏泄機事于敵人匿姦細緣由于境內者斬之嫉蔽賢良使才士不得見用于緩急者斬之更令稽令失令玩令者斬之違主將一時之令者斬之守城破陷悉斬守者圍敵潰圍悉斬圍者宜戰不戰悉斬戰者當援不援悉斬鄰隊遇急不舉烽號及先舉而後斷續不應者死之軍行在途糧草遲到所過而誤支給則司餉者死之出軍在道若見前隊遺失器械銀錢等物許所見本隊隊伍長收貯待營定則稟所管偏裨以召失主認領妄認及隱匿者皆斬後隊見而不收者亦打百棍隱匿臨陳死亡士卒資財者斬吏士受贓定罪紀功不實者斬臨敵自訴傷殘欲避戰鬭之險者斬臨戰失去衣甲器械或質為宿娼賭飲之資者斬敵有棄械解甲乞降而輒殺者斬獲得敵人私書即宜密送主將或先開讀及先與本營官看者斬敵使入軍非主司輒與語者斬擒獲敵人及來降者即時領見主將不得輒問敵中事宜因而漏泄者斬行軍出戰採樵牧汲不遵號令者斬忽見怪異飛走之物入營能捕獲者急送主將設有私自藏匿傳告于人者斬測度軍中行事者斬出師在道雖值飄風驟雨無令軍士棲止忠臣孝子義士節婦之家違令者斬軍臨敵境有妄殺老少發毁冢墓搶掠資財焚燒廬舍踐禾伐木者斬夜深無故號呼驚營動衆者斬鄰隊鄰伍知其驚營而不靜待亦故附其號呼者俱斬營中無故火起燒其軍幕器具斬其發火之伍仍沒其家除主將傳令某伍某隊救火外餘不得輒離職掌擅動者斬五兵不利衣甲不精以致臨敵不堪施用者斬倚其利口巧舌般弄是非以致軍士不協者斬妄言神鬼夢寐禍福動感吏士者斬竊人貨物為己財奪人首級為己功者斬指麾令出有低眉俯首結舌不應而作難色者斬倔疆使令出言怨上者斬不守禁約髙聲喧笑傍若無人者斬託疾譎病以避艱險扶傷舁死因而欲遁者斬大將與左右偏禆聚議密事有逼帳屬坦竊聽者斬探敵不的報敵不詳多少失數逺近罔實者斬司犒掌賞私厚所親故薄所怨以致人心不平者斬刁斗不振更籌失遺號火滅息者斬非犒設而無故致醉狂呼者斬令者將之大柄所謂內畏重刑外無堅敵故不得不重也然臨斬權宜務使三軍心服乃是戰機得戰之機者藏形于無遊心于虛故聖人常務靜以待敵之有形所以放乎九天之上蟠乎九淵之下以其無形可見也深間不能窺智者不能謀以其無隙可乘也不襲堂堂之陳不擊正正之旗欲待其形之先見也見敵之有形矣乃任我之氣勢或擊其先動或乘其釁生敵將堅壁我則突其未成急趨其可攻敵欲衝我我則絶其必返先備其所從敵長則截之敵亂則惑之敵薄則擊之敵疑則懾之敵恃則奪之敵疏則襲之若驚鳥之忽起若颶風之陡發倐忽上下莫知止遏如雷霆之震擊如暴雨之傾注左右前後莫知所禦是故有風雨之行故能威絶域之民有飛鳥之舉故能服恃固之國有雷電之戰故能獨行而無敵是以善戰者必以盛而乘衰以實而擊虛以疾而掩遲以飽而制飢應之以不窮投之以不測飄飄忽忽莫知所之獨出與獨入莫知所謀其合如雲其變如龍若從天降若出地中猶水之撲火無不息湯之沃雪無不溶既其退也敵不知我之所守其進也敵不知我之所攻且夫水性至柔而能觸崩丘陵性專而觸成也市合脆而能必勝徑敵以死而易生也茍能指士卒之進退如驅羣羊麾偏禆之赴戰如縱鷹犬使其上雲顛而不知其為髙入叢林而不知其為礙蹈重淵而不知其為深者乃可稱將兵深入敵境而無一人動靜者必有埋伏絶我歸也須令徑勇為搜捕繼強弩以翼之發輕騎以應之急守糧道設犄角堅整大陳數出竒兵振其先聲為左右逐掠敵若空虛急乘我之機勢地勢相逺彼此力均不可挑戰恐費奔趨之勞敵或有隙必速壓之無使其復備也我可以往彼可以來之地必先居髙通餉其勢乃佚其戰則利孫子謂先處戰地而待敵者佚後處戰地而趨戰者勞所為善戰者能致人而不為人所致尉子謂敵地大而城小者必先收其地城大而地窄者必先攻其城地廣而人寡者則先絶其厄地窄而人衆者則築大堙以臨之故作戰必因地勢之便猝與敵遇乃因地而發令焉而復用其險阻山林水泉丘墓之利也地易逺曠以車騎相因草木蒙蔽以步卒接戰長林茂陵以竒伏迭出深峽隘口止衆用少逾水涉澗益以火弩髙下相懸未可逼近晝多旌旗夜多火鼓風雨雪霧變以笳角以寡擊衆務于隘塞必于暮夜伏于叢茂要于險阻以衆擊寡務于廣漫利于旦辰分守要津絶彼運道若驅水火須知攫後搏前偶際晦冥必識相機邀襲與敵分險相拒猶當塞谷備衢廣我戰道處山之左急備山之右處山之右急備山之左我地險悖動有挂礙可以往不便于返者當謹我歸路敵若無備分兵擊之敵若有備不可出也壁以武剛隨以踵卒續發哨探密遣埋伏務得虛實逺近衆寡之情然後可為致勝之策哨探埋伏必選精鋭誠實抑非庸卒可使然致勝詭譎情狀萬端若指以山谷蒙翳處伏藏之伏為伏不過尋常之伏耳是豈能應命于不窮哉故善伏者敵雖巧智無能測識我之所伏也是以用伏之微非神化乎兵術者未可與語伏淮南子謂敵躁我靜必罷其力敵先我動必觀其形别其邪正以制其命審其所處或極其因敵或反靜先出我竒敵謹後節即與推移敵有所積必有所虧敵若左轉覆其右陂故能先弱敵而後戰者費不半而功自倍管子曰不明于敵人之將不先軍也不明于敵人之士不先陳也士卒未附教習未精敵情未得不可以言戰也是故文王不能使不附之民先軫不能戰不教之卒王良造父不能以敝車駕馬疾趨而致逺后羿逄蒙不能以枉矢弱弓射逺而中微所以善兵者必使其兵利也甲堅也力治也令信也機得也乃量彼己之勢而後握必勝之權故士卒倚其必勝而自輕鬭魏文矦曰有師甚衆既武且勇皆入險阻右山左水深溝髙壘守以強弩退如山移進如風雨糧食又多難與長守則如之何吳起曰大哉問非車騎之力聖人之謀也能備千乘萬騎兼之徒步分為五軍軍各一衢五軍五衢敵人必惑莫知所加嚴陳堅守以固其兵急行間諜以觀其慮彼聽吾説解而去之不聽吾説斬使焚書分為五戰戰勝勿追不勝疾走如是佯北安行勿鬭一結其前一絶其後兩軍銜枚或左或右而襲其處五軍交至必有其利此擊強之道也臣謂吳起擊強之道乃以五軍交至而必有其利管仲必勝之道乃以卒附教精兵甲堅利而明敵人之情敵人之將敵人之士而後戰也劉安握戰之機乃罷敵力觀敵形因敵勢而與之推移謂先弱敵而後戰者費不半而功自倍三子論兵其竅則一其用則不同耳吳子雄而鋭管子重而堅劉子巧而無定巧而無定者談兵者也談兵者每作其形勢難其機權神其應變直欲雄視千古而後已用兵者必盡諸人事慮其垂成觸處機隨故無往而不利所以談兵與用兵之才大異霄壤如能談兵而又必能用者臣不敢不讓管吳也陳紀卷三
